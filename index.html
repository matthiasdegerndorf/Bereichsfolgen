<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bereichsfolge Brannenburg RO-L</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #222636; --border: #2e3348;
    --text: #e8eaf0; --muted: #8b90a8;
    --rol: #3b82f6; --rol-bg: #1e3a5f; --rol-muted: #93c5fd;
    --ros: #10b981; --ros-bg: #064e3b; --ros-muted: #6ee7b7;
    --mb: #f59e0b; --mb-bg: #78350f; --mb-muted: #fcd34d;
    --accent: #6366f1; --accent-glow: rgba(99,102,241,0.15);
    --match: #22d3ee; --match-bg: rgba(34,211,238,0.12); --match-border: rgba(34,211,238,0.35);
    --ab: #f97316; --ab-bg: rgba(249,115,22,0.15); --ab-border: rgba(249,115,22,0.35);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { background: linear-gradient(135deg,#1a1d27,#151824); border-bottom: 1px solid var(--border); padding: 20px 24px 16px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .logo { width: 38px; height: 38px; background: linear-gradient(135deg,var(--accent),#8b5cf6); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; box-shadow: 0 0 20px var(--accent-glow); }
  .title-block h1 { font-size: 1.15rem; font-weight: 700; color: #fff; }
  .title-block p  { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; padding: 8px 12px 8px 36px; outline: none; transition: border-color .2s; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .btn-group { display: flex; gap: 6px; }
  .filter-btn { padding: 7px 13px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 0.76rem; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active-rol { background: var(--rol-bg); border-color: var(--rol); color: var(--rol-muted); }
  .filter-btn.active-ros { background: var(--ros-bg); border-color: var(--ros); color: var(--ros-muted); }
  .filter-btn.active-mb  { background: var(--mb-bg);  border-color: var(--mb);  color: var(--mb-muted); }

  /* VIEW TABS */
  .view-toggle { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); flex-shrink: 0; }
  .view-btn { padding: 7px 14px; border: none; background: var(--surface2); color: var(--muted); font-size: 0.76rem; font-weight: 600; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; }
  .view-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .view-btn.active { background: var(--accent); color: #fff; }
  .view-btn.active-ab { background: var(--ab); color: #fff; }
  .view-btn:hover:not(.active):not(.active-ab) { background: var(--border); color: var(--text); }

  .stats-bar { display: flex; gap: 16px; margin-top: 10px; font-size: 0.72rem; color: var(--muted); flex-wrap: wrap; align-items: center; }
  .stats-bar span b { color: var(--text); }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  main { padding: 20px 20px 40px; max-width: 1400px; margin: 0 auto; }

  /* === ZONEN VIEW === */
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px; }
  .zone-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .2s, box-shadow .2s; cursor: pointer; }
  .zone-card:hover { border-color: #3e4460; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  .zone-card.expanded { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 4px 24px rgba(99,102,241,0.2); }
  .card-head { padding: 13px 15px 12px; display: flex; align-items: flex-start; gap: 10px; user-select: none; }
  .zone-num { width: 26px; height: 26px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: var(--muted); flex-shrink: 0; margin-top: 1px; }
  .card-info { flex: 1; min-width: 0; }
  .zone-name { font-size: 0.87rem; font-weight: 600; color: #fff; margin-bottom: 5px; }
  .oertlich-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .label-tag { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
  .label-oertlich { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
  .ff-chip { font-size: 0.72rem; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .chip-rol { background: var(--rol-bg); color: var(--rol-muted); border: 1px solid rgba(59,130,246,0.3); }
  .chip-ros { background: var(--ros-bg); color: var(--ros-muted); border: 1px solid rgba(16,185,129,0.3); }
  .chip-mb  { background: var(--mb-bg);  color: var(--mb-muted);  border: 1px solid rgba(245,158,11,0.3); }
  .chevron { margin-left: auto; flex-shrink: 0; color: var(--muted); transition: transform .2s; align-self: center; }
  .zone-card.expanded .chevron { transform: rotate(180deg); }
  .card-body { display: none; border-top: 1px solid var(--border); padding: 12px 15px 14px; background: rgba(0,0,0,0.15); }
  .zone-card.expanded .card-body { display: block; }
  .section-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .ff-list { display: flex; flex-direction: column; gap: 4px; }
  .ff-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 6px; transition: background .1s; }
  .ff-row:hover { background: rgba(255,255,255,0.03); }
  .ff-row.top10-match { background: var(--match-bg); border: 1px solid var(--match-border); }
  .ff-row-nr { font-size: 0.65rem; font-weight: 700; color: var(--muted); width: 20px; text-align: right; flex-shrink: 0; }
  .ff-row-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-rol{background:var(--rol)} .dot-ros{background:var(--ros)} .dot-mb{background:var(--mb)}
  .ff-row-name { font-size: 0.76rem; color: var(--text); flex: 1; min-width: 0; }
  .ff-row-code { font-size: 0.62rem; color: var(--muted); flex-shrink: 0; }
  .show-more-btn { background: none; border: 1px dashed var(--border); color: var(--muted); font-size: 0.72rem; cursor: pointer; padding: 5px 10px; border-radius: 6px; margin-top: 6px; width: 100%; transition: all .15s; }
  .show-more-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* === GRUPPEN VIEW === */
  #groups-view { display: none; flex-direction: column; gap: 0; }
  #groups-view.visible { display: flex; }
  .subtabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .subtab { padding: 10px 20px; border: none; background: none; color: var(--muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; margin-bottom: -1px; }
  .subtab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .subtab:hover:not(.active) { color: var(--text); }
  .subtab-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 0.6rem; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; padding: 0 5px; margin-left: 6px; }
  .subtab.active .subtab-badge { background: var(--accent-glow); border-color: var(--accent); color: #a5b4fc; }
  .subtab-content { display: none; flex-direction: column; gap: 16px; }
  .subtab-content.active { display: flex; }
  .group-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .group-header { padding: 14px 18px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .group-badge { background: linear-gradient(135deg,var(--accent),#8b5cf6); color: #fff; font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .group-badge.top10 { background: linear-gradient(135deg,#0891b2,#0e7490); }
  .group-zones { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .zone-pill { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 0.72rem; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .group-body { padding: 14px 18px; }
  .group-seq-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .group-seq-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .seq-table { display: flex; flex-direction: column; gap: 3px; }
  .seq-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 6px; border: 1px solid transparent; }
  .seq-row.highlight { background: var(--match-bg); border-color: var(--match-border); }
  .seq-row-nr { font-size: 0.65rem; font-weight: 700; color: var(--muted); width: 20px; text-align: right; flex-shrink: 0; }
  .seq-row-name { font-size: 0.76rem; flex: 1; }
  .seq-row-code { font-size: 0.62rem; color: var(--muted); }
  .match-icon { font-size: 0.6rem; color: var(--match); font-weight: 700; margin-left: auto; }
  .singleton-section { margin-top: 4px; }
  .singleton-title { font-size: 0.75rem; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .singleton-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .singleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
  .singleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; display: flex; align-items: center; gap: 8px; }

  /* === AUTOBAHN VIEW === */
  #ab-view { display: none; flex-direction: column; gap: 0; }
  #ab-view.visible { display: flex; }

  .ab-header-bar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .ab-filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .ab-filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); font-size: 0.75rem; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .ab-filter-btn:hover { border-color: var(--ab); color: var(--text); }
  .ab-filter-btn.active { background: var(--ab-bg); border-color: var(--ab); color: #fdba74; }

  .ab-direction-block { margin-bottom: 28px; }
  .ab-direction-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    padding: 10px 16px; background: var(--ab-bg); border: 1px solid var(--ab-border);
    border-radius: var(--radius);
  }
  .ab-road-badge {
    background: var(--ab); color: #fff; font-size: 0.8rem; font-weight: 800;
    padding: 4px 12px; border-radius: 6px; letter-spacing: 0.05em; flex-shrink: 0;
  }
  .ab-direction-arrow {
    display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text);
  }
  .ab-arrow { color: var(--ab); font-size: 1.1rem; }
  .ab-count { margin-left: auto; font-size: 0.7rem; color: var(--muted); }

  /* Abschnitt cards in a grid */
  .ab-sections-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px;
  }
  .ab-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; cursor: pointer; transition: border-color .2s, box-shadow .2s;
  }
  .ab-card:hover { border-color: rgba(249,115,22,0.5); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .ab-card.expanded { border-color: var(--ab); box-shadow: 0 0 0 1px var(--ab), 0 4px 20px var(--ab-bg); }
  .ab-card-head {
    padding: 12px 15px; display: flex; align-items: flex-start; gap: 10px; user-select: none;
  }
  .ab-km-badge {
    background: var(--ab-bg); border: 1px solid var(--ab-border); color: #fdba74;
    font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 6px;
    flex-shrink: 0; white-space: nowrap; margin-top: 2px;
  }
  .ab-card-info { flex: 1; min-width: 0; }
  .ab-section-name { font-size: 0.84rem; font-weight: 600; color: #fff; margin-bottom: 4px; line-height: 1.3; }
  .ab-ff-preview { font-size: 0.7rem; color: var(--muted); }
  .ab-ff-preview b { color: #fdba74; }
  .ab-card-body { display: none; border-top: 1px solid var(--border); padding: 12px 15px 14px; background: rgba(0,0,0,0.15); }
  .ab-card.expanded .ab-card-body { display: block; }
  .ab-card.expanded .chevron { transform: rotate(180deg); }

  .ab-ff-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 6px; transition: background .1s; }
  .ab-ff-row:hover { background: rgba(255,255,255,0.03); }
  .ab-ff-row-nr { font-size: 0.65rem; font-weight: 700; color: var(--muted); width: 20px; text-align: right; flex-shrink: 0; }
  .ab-ff-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ab); flex-shrink: 0; }
  .ab-ff-name { font-size: 0.76rem; flex: 1; }

  @media (max-width: 600px) {
    header { padding: 14px 14px 12px; }
    main { padding: 12px 10px 40px; }
    #grid { gap: 10px; grid-template-columns: 1fr; }
    .ab-sections-grid { grid-template-columns: 1fr; }
    .view-btn span { display: none; }
  }
</style>
</head>

  <div class="stats-bar">

    <div class="legend" id="legend-zones">
      <div class="legend-item"><div class="legend-dot" style="background:var(--rol)"></div>RO-L Landkreis Rosenheim</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--ros)"></div>RO-S Stadt Rosenheim</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--mb)"></div>MB Miesbach</div>
    </div>
    <div class="legend" id="legend-ab" style="display:none">
      <div class="legend-item"><div class="legend-dot" style="background:var(--ab)"></div>Autobahnabschnitte</div>
    </div>
  </div>
</header>

<main>
  <div id="grid"></div>
  <div id="groups-view"></div>
  <div id="ab-view"></div>
</main>

// Precompute group membership
function buildGroupMap(keyFn) {
  const m = new Map();
  Object.entries(BDATA).forEach(([z,d]) => {
    const k = keyFn(d);
    if (!m.has(k)) m.set(k, []);
    m.get(k).push(z);
  });
  return m;
}
const fullGroupMap  = buildGroupMap(d => d.ortsteil.map(f=>f.name).join('|'));
const top10GroupMap = buildGroupMap(d => d.ortsteil.slice(0,10).map(f=>f.name).join('|'));
const zoneTop10Peers = {};
Object.entries(BDATA).forEach(([z,d]) => {
  const k = d.ortsteil.slice(0,10).map(f=>f.name).join('|');
  zoneTop10Peers[z] = (top10GroupMap.get(k)||[]).filter(x=>x!==z);
});

function prefix(n) { return n.includes('RO-L')?'rol':n.includes('RO-S')?'ros':n.includes('MB')?'mb':'rol'; }

        (showAll?ortsteil:ortsteil.slice(0,MAX)).forEach(ff => {
          const p=prefix(ff.name); const isH=ff.nr<=10&&peers.length>0;
          const row=document.createElement('div'); row.className='ff-row'+(isH?' top10-match':'');
          row.innerHTML=`<span class="ff-row-nr">${ff.nr}</span><span class="ff-row-dot dot-${p}"></span><span class="ff-row-name">${shortName(ff.name)}</span><span class="ff-row-code">${ffCode(ff.name)}</span>${isH?'<span style="font-size:0.55rem;color:var(--match);margin-left:auto">Top 10</span>':''}`;
          list.appendChild(row);
        });
        body.appendChild(list);
        if (ortsteil.length>MAX) {
          const btn=document.createElement('button'); btn.className='show-more-btn';
          btn.textContent=showAll?'▲ Weniger':`▼ Alle ${ortsteil.length} anzeigen`;
          btn.onclick=e=>{e.stopPropagation();showAll=!showAll;buildList();};
          body.appendChild(btn);
        }
        if (peers.length>0) {
          const note=document.createElement('div');
          note.style.cssText='font-size:0.68rem;color:var(--match);margin-top:8px;padding:6px 10px;background:var(--match-bg);border-radius:6px;border:1px solid var(--match-border)';
          note.innerHTML=`⟳ Top-10-Folge identisch mit: <b>${peers.join(', ')}</b>`;
          body.appendChild(note);
        }
      }
      buildList();
    } else { body.innerHTML='<div style="color:var(--muted);font-size:0.76rem;padding:4px 8px">Keine Ortsteil-Folge hinterlegt</div>'; }
    card.appendChild(body);
    card.querySelector('.card-head').addEventListener('click',()=>{
      if(expanded.has(zoneName)){expanded.delete(zoneName);card.classList.remove('expanded');}
      else{expanded.add(zoneName);card.classList.add('expanded');}
    });
    grid.appendChild(card);
  });
  document.getElementById('stat-visible').textContent=visible;
  document.getElementById('stat-label').textContent='Zonen';
}

/* ========== GRUPPEN VIEW ========== */
function buildGroupBlocks(groupMap, hl10, container) {
  const q = searchVal.toLowerCase();
  const groups = [...groupMap.entries()].map(([k,zz])=>({key:k,zones:zz,ortsteil:BDATA[zz[0]]?.ortsteil||[]})).filter(g=>g.zones.length>1).sort((a,b)=>b.zones.length-a.zones.length);
  const singles = [...groupMap.entries()].filter(([_,z])=>z.length===1).map(([_,z])=>z[0]).sort();
  function match(g){if(!q)return true;return g.zones.some(z=>z.toLowerCase().includes(q))||g.ortsteil.some(f=>f.name.toLowerCase().includes(q));}
  const fG=groups.filter(match), fS=singles.filter(z=>!q||z.toLowerCase().includes(q)||(BDATA[z]?.ortsteil||[]).some(f=>f.name.toLowerCase().includes(q)));
  document.getElementById('stat-visible').textContent=fG.reduce((s,g)=>s+g.zones.length,0)+fS.length;
  document.getElementById('stat-label').textContent='Zonen';
  if(!fG.length&&!fS.length){container.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)">Keine Gruppen gefunden</div>';return;}
  fG.forEach((g,gi)=>{
    const block=document.createElement('div'); block.className='group-block';
    const zHtml=g.zones.map(z=>`<span class="zone-pill">${z}</span>`).join('');
    const MAX=12; let showAll=false;
    function build(){
      block.innerHTML=`<div class="group-header"><span class="group-badge${hl10?' top10':''}">${hl10?'Top-10':'Gruppe'} ${gi+1} · ${g.zones.length} Zonen</span><div class="group-zones">${zHtml}</div></div><div class="group-body"><div class="group-seq-title">${hl10?'Gemeinsame Top-10-Folge':'Identische Gesamtfolge'} (${g.ortsteil.length} FF)</div><div class="seq-table" id="st${hl10?'t':'f'}${gi}"></div>${g.ortsteil.length>MAX?`<button class="show-more-btn" id="sb${hl10?'t':'f'}${gi}"></button>`:''}</div>`;
      function fill(){
        const el=block.querySelector(`#st${hl10?'t':'f'}${gi}`); el.innerHTML='';
        (showAll?g.ortsteil:g.ortsteil.slice(0,MAX)).forEach(ff=>{
          const p=prefix(ff.name); const isH=hl10&&ff.nr<=10;
          const row=document.createElement('div'); row.className='seq-row'+(isH?' highlight':'');
          row.innerHTML=`<span class="seq-row-nr">${ff.nr}</span><span class="ff-row-dot dot-${p}"></span><span class="seq-row-name">${shortName(ff.name)}</span><span class="seq-row-code">${ffCode(ff.name)}</span>${isH?'<span class="match-icon">✦ Top 10</span>':''}`;
          el.appendChild(row);
        });
        const btn=block.querySelector(`#sb${hl10?'t':'f'}${gi}`);
        if(btn){btn.textContent=showAll?'▲ Weniger':`▼ Alle ${g.ortsteil.length} anzeigen`;btn.onclick=()=>{showAll=!showAll;fill();};}
      }
      fill();
    }
    build(); container.appendChild(block);
  });
  if(fS.length){
    const sec=document.createElement('div'); sec.className='singleton-section';
    sec.innerHTML=`<div class="singleton-title">Zonen mit einzigartiger Folge (${fS.length})</div>`;
    const sg=document.createElement('div'); sg.className='singleton-grid';
    fS.forEach(z=>{
      const o=BDATA[z]?.oertlich[0]; const op=o?prefix(o.name):'rol';
      const c=document.createElement('div'); c.className='singleton-card';
      c.innerHTML=`<div style="flex:1;min-width:0"><div style="font-size:0.76rem;font-weight:600;margin-bottom:3px">${z}</div>${o?`<span class="ff-chip chip-${op}" style="font-size:0.66rem">${shortName(o.name)}</span>`:''}</div><span style="font-size:0.65rem;color:var(--muted)">${BDATA[z]?.ortsteil?.length||0} FF</span>`;
      sg.appendChild(c);
    });
    sec.appendChild(sg); sec.appendChild(sg); container.appendChild(sec);
  }
}
function renderGroups() {
  const c=document.getElementById('groups-view');
  const fm=[...fullGroupMap.values()].filter(g=>g.length>1).length;
  const tm=[...top10GroupMap.values()].filter(g=>g.length>1).length;
  c.innerHTML=`<div class="subtabs"><button class="subtab ${activeSubtab==='komplett'?'active':''}" onclick="switchSubtab('komplett')">Vollständig identisch <span class="subtab-badge">${fm}</span></button><button class="subtab ${activeSubtab==='top10'?'active':''}" onclick="switchSubtab('top10')">Top 10 identisch <span class="subtab-badge">${tm}</span></button></div><div class="subtab-content ${activeSubtab==='komplett'?'active':''}" id="tab-komplett"></div><div class="subtab-content ${activeSubtab==='top10'?'active':''}" id="tab-top10"></div>`;
  if(activeSubtab==='komplett') buildGroupBlocks(fullGroupMap,false,document.getElementById('tab-komplett'));
  else buildGroupBlocks(top10GroupMap,true,document.getElementById('tab-top10'));
}
window.switchSubtab=tab=>{activeSubtab=tab;renderGroups();};

/* ========== AUTOBAHN VIEW ========== */
function renderAutobahn() {
  const c = document.getElementById('ab-view');
  const q = searchVal.toLowerCase();
  c.innerHTML = '';

  // Filter bar
  const bar = document.createElement('div'); bar.className='ab-header-bar';
  bar.innerHTML=`<div class="ab-filter-group"><button class="ab-filter-btn ${abFilter==='all'?'active':''}" onclick="setAbFilter('all')">Alle</button><button class="ab-filter-btn ${abFilter==='A93'?'active':''}" onclick="setAbFilter('A93')">A93</button><button class="ab-filter-btn ${abFilter==='A8'?'active':''}" onclick="setAbFilter('A8')">A8</button></div>`;
  c.appendChild(bar);

  // Group by autobahn + direction
  const dirMap = new Map();
  ADATA.forEach(ab => {
    if (abFilter !== 'all' && ab.autobahn !== abFilter) return;
    if (q) {
      const inAb = ab.autobahn.toLowerCase().includes(q)||ab.abschnitt.toLowerCase().includes(q)||ab.richtung_von.toLowerCase().includes(q)||ab.richtung_bis.toLowerCase().includes(q);
      const inFF = ab.feuerwehren.some(f=>f.name.toLowerCase().includes(q));
      if (!inAb && !inFF) return;
    }
    const dirKey = `${ab.autobahn}||${ab.richtung_von}||${ab.richtung_bis}`;
    if (!dirMap.has(dirKey)) dirMap.set(dirKey, {autobahn:ab.autobahn, von:ab.richtung_von, bis:ab.richtung_bis, abschnitte:[]});
    dirMap.get(dirKey).abschnitte.push(ab);
  });

  let totalSections = 0;
  dirMap.forEach(dir => {
    totalSections += dir.abschnitte.length;
    const block = document.createElement('div'); block.className='ab-direction-block';
    block.innerHTML=`<div class="ab-direction-header"><span class="ab-road-badge">${dir.autobahn}</span><div class="ab-direction-arrow"><span>${dir.von}</span><span class="ab-arrow">→</span><span>${dir.bis}</span></div><span class="ab-count">${dir.abschnitte.length} Abschnitte</span></div>`;
    const grid = document.createElement('div'); grid.className='ab-sections-grid';

    dir.abschnitte.forEach((ab, i) => {
      const card = document.createElement('div'); card.className='ab-card';
      const kmText = ab.km_von < ab.km_bis ? `km ${ab.km_von}–${ab.km_bis}` : `km ${ab.km_von}–${ab.km_bis}`;
      const first3 = ab.feuerwehren.slice(0,3).map(f=>f.name).join(', ');
      card.innerHTML=`<div class="ab-card-head"><span class="ab-km-badge">${kmText}</span><div class="ab-card-info"><div class="ab-section-name">${ab.abschnitt}</div><div class="ab-ff-preview"><b>${ab.feuerwehren.length} FF</b> · ${first3}${ab.feuerwehren.length>3?'…':''}</div></div><svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>`;
      const body = document.createElement('div'); body.className='ab-card-body';
      const MAX=12; let showAll=false;
      function buildAbList(){
        body.innerHTML='<div class="section-title">Alarmierungsfolge</div>';
        const list=document.createElement('div'); list.className='ff-list';
        (showAll?ab.feuerwehren:ab.feuerwehren.slice(0,MAX)).forEach(ff=>{
          const row=document.createElement('div'); row.className='ab-ff-row';
          row.innerHTML=`<span class="ab-ff-row-nr">${ff.nr}</span><span class="ab-ff-dot"></span><span class="ab-ff-name">${ff.name}</span>`;
          list.appendChild(row);
        });
        body.appendChild(list);
        if(ab.feuerwehren.length>MAX){
          const btn=document.createElement('button'); btn.className='show-more-btn';
          btn.textContent=showAll?'▲ Weniger':`▼ Alle ${ab.feuerwehren.length} anzeigen`;
          btn.onclick=e=>{e.stopPropagation();showAll=!showAll;buildAbList();};
          body.appendChild(btn);
        }
      }
      buildAbList();
      card.appendChild(body);
      card.querySelector('.ab-card-head').addEventListener('click',()=>{
        card.classList.toggle('expanded');
      });
      grid.appendChild(card);
    });
    block.appendChild(grid);
    c.appendChild(block);
  });

  document.getElementById('stat-visible').textContent = totalSections;
  document.getElementById('stat-label').textContent = 'Abschnitte';

  if (totalSections === 0) {
    const msg=document.createElement('div');
    msg.style.cssText='text-align:center;padding:60px;color:var(--muted)';
    msg.textContent='Keine Abschnitte gefunden';
    c.appendChild(msg);
  }
}
window.setAbFilter=f=>{abFilter=f;renderAutobahn();};

/* ========== VIEW SWITCH ========== */
window.setView = v => {
  currentView = v;
  document.getElementById('btn-zonen').className='view-btn'+(v==='zonen'?' active':'');
  document.getElementById('btn-gruppen').className='view-btn'+(v==='gruppen'?' active':'');
  document.getElementById('btn-autobahn').className='view-btn'+(v==='autobahn'?' active-ab':'');
  document.getElementById('grid').style.display=v==='zonen'?'grid':'none';
  document.getElementById('groups-view').classList.toggle('visible',v==='gruppen');
  document.getElementById('ab-view').classList.toggle('visible',v==='autobahn');
  document.getElementById('prefix-filters').style.display=v==='autobahn'?'none':'flex';
  document.getElementById('legend-zones').style.display=v==='autobahn'?'none':'flex';
  document.getElementById('legend-ab').style.display=v==='autobahn'?'flex':'none';
  if(v==='zonen') renderGrid();
  else if(v==='gruppen') renderGroups();
  else renderAutobahn();
};

document.getElementById('search').addEventListener('input',e=>{
  searchVal=e.target.value;
  if(currentView==='zonen') renderGrid();
  else if(currentView==='gruppen') renderGroups();
  else renderAutobahn();
});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const f=btn.dataset.filter;
    if(activeFilter===f){activeFilter=null;btn.className='filter-btn';}
    else{activeFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.className='filter-btn');btn.classList.add('active-'+f);}
    if(currentView==='zonen') renderGrid();
  });
});

renderGrid();
</script>
</body>
